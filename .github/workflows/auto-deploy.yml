name: Auto-deploy to Vercel

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          set -e
          response=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Deploy hook returned non-2xx status"
            exit 1
          fi
